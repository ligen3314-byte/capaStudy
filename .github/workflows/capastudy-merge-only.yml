name: capaStudy Daily Merge Only

on:
  schedule:
    # 09:15 Asia/Shanghai = 01:15 UTC
    - cron: "15 1 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-merge-only:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      PYTHONUNBUFFERED: "1"
      PYTHONUTF8: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests openpyxl python-dotenv psycopg[binary]

      - name: Prepare env files
        shell: bash
        run: |
          cat > .env <<EOF
          RDS_HOST=${{ secrets.RDS_HOST }}
          RDS_PORT=${{ secrets.RDS_PORT }}
          RDS_DB=${{ secrets.RDS_DB }}
          RDS_USER=${{ secrets.RDS_USER }}
          RDS_PASSWORD=${{ secrets.RDS_PASSWORD }}
          RDS_SSLMODE=${{ secrets.RDS_SSLMODE }}
          EOF

          mkdir -p vessels
          cat > vessels/.env <<EOF
          MYVESSEL_BEARER_TOKEN=${{ secrets.MYVESSEL_BEARER_TOKEN }}
          MYVESSEL_REFERER=${{ secrets.MYVESSEL_REFERER }}
          MYVESSEL_RECORD_NUM=10
          MYVESSEL_TIMEOUT=30
          MYVESSEL_NON_INTERACTIVE=1
          CSL_COOKIE=${{ secrets.CSL_COOKIE }}
          CSL_HEADLESS=1
          EOF

      - name: Run merge only
        id: merge
        shell: bash
        run: |
          set +e
          python run_pipeline.py --only-merge
          status=$?
          set -e

          latest_log="$(ls -t logs/full_pipeline_*.log 2>/dev/null | head -1 || true)"
          token_failed=0
          if [[ -n "$latest_log" ]]; then
            if grep -Eqi "TOKEN_UNAUTHORIZED|token expired/unauthorized|MYVESSEL_BEARER_TOKEN" "$latest_log"; then
              token_failed=1
            fi
          fi

          echo "status=$status" >> "$GITHUB_OUTPUT"
          echo "latest_log=$latest_log" >> "$GITHUB_OUTPUT"
          echo "token_failed=$token_failed" >> "$GITHUB_OUTPUT"
          echo "Merge-only status=$status, token_failed=$token_failed, latest_log=$latest_log"
          exit 0

      - name: Sync current to RDS
        if: steps.merge.outputs.status == '0'
        run: |
          python sync_to_rds.py --mode current

      - name: Commit updated vessels_db.xlsx
        if: steps.merge.outputs.status == '0'
        shell: bash
        run: |
          if [[ ! -f "vessels/vessels_db.xlsx" ]]; then
            echo "vessels/vessels_db.xlsx not found, skip commit."
            exit 0
          fi

          if git diff --quiet -- vessels/vessels_db.xlsx; then
            echo "No changes in vessels/vessels_db.xlsx, skip commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add vessels/vessels_db.xlsx
          git commit -m "chore(vessels): update vessels_db.xlsx [skip ci]"
          git push

      - name: Send token-expired email
        if: steps.merge.outputs.status != '0' && steps.merge.outputs.token_failed == '1'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_SERVER }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "[capaStudy] Merge-only failed: MyVessel token expired"
          to: ${{ secrets.NOTIFY_TO_EMAIL }}
          from: ${{ secrets.NOTIFY_FROM_EMAIL }}
          secure: true
          body: |
            capaStudy merge-only workflow failed because MyVessel token is unauthorized.
            Please update MYVESSEL_BEARER_TOKEN and rerun merge manually.

            Workflow: ${{ github.workflow }}
            Run URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
            Latest log file: ${{ steps.merge.outputs.latest_log }}

      - name: Upload logs and outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: capastudy-merge-only-artifacts-${{ github.run_id }}
          path: |
            logs/**
            data/merged/**
            data/state/**
            merged_query/**
          if-no-files-found: warn

      - name: Fail workflow when merge-only failed
        if: steps.merge.outputs.status != '0'
        run: |
          echo "Merge-only failed with status ${{ steps.merge.outputs.status }}"
          exit 1
